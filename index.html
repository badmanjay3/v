<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Surprise</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #a06eff, #6b3ca5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 400px;
    position: relative;
    text-align: center;
    z-index: 2;
}

/* Buttons below the card */
button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s ease;
    position: relative;
}

#yesBtn {
    background-color: #ff4d6d;
    color: white;
    margin-top: 20px;
}

#noBtn {
    background-color: #ddd;
    margin-top: 20px;
}

/* Message */
#message {
    margin-top: 20px;
    font-weight: bold;
    color: #ff4d6d;
}

/* Confetti canvas hidden initially */
#confetti-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    display: none;
}
</style>
</head>
<body>

<div class="card" id="card">
    <h1>Before You Say No Again…</h1>
    <p>I know you said no yesterday. But I had to ask properly.</p>
    <p>Will you be my Valentine?</p>

    <!-- Formspree Yes button -->
    <form id="valentineForm" action="https://formspree.io/f/mbdagajr" method="POST">
        <input type="hidden" name="message" value="She clicked YES to being my Valentine!">
        <button type="submit" id="yesBtn">Yes 💖</button>
    </form>

    <button id="noBtn">No 😪</button>
    <div id="message"></div>
</div>

<!-- Confetti canvas -->
<canvas id="confetti-canvas"></canvas>

<!-- Music -->
<audio id="yesMusic" src="Say Yes To Heaven (Instrumental).mp3" type="audio/mpeg" autoplay loop></audio>

<script>
// Music setup
const music = document.getElementById("yesMusic");
music.volume = 0.1;
music.play().catch(()=>{});

// No button movement (constrained to viewport)
const noBtn = document.getElementById("noBtn");
function moveButton(e){
    if(e) e.preventDefault();
    const buttonWidth = noBtn.offsetWidth;
    const buttonHeight = noBtn.offsetHeight;
    const maxX = window.innerWidth - buttonWidth - 10;
    const maxY = window.innerHeight - buttonHeight - 10;
    const x = Math.random() * maxX;
    const y = Math.random() * maxY;
    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

// Volume ramp function
function increaseVolume(target = 1.0, step = 0.02, interval = 50) {
    const fade = setInterval(() => {
        if(music.volume < target){
            music.volume = Math.min(music.volume + step, target);
        } else {
            clearInterval(fade);
        }
    }, interval);
}

// Confetti
const confettiCanvas = document.getElementById('confetti-canvas');
const ctx = confettiCanvas.getContext('2d');
confettiCanvas.width = window.innerWidth;
confettiCanvas.height = window.innerHeight;

let confettiPieces = [];
function createConfetti(){
    for(let i=0;i<150;i++){
        confettiPieces.push({
            x: Math.random()*confettiCanvas.width,
            y: Math.random()*confettiCanvas.height - confettiCanvas.height,
            r: Math.random()*6 + 4,
            d: Math.random()*50 + 10,
            color: `hsl(${Math.random()*360}, 100%, 50%)`,
            tilt: Math.random()*10 -10,
            tiltAngleIncrement: Math.random()*0.07+0.05
        });
    }
}
function drawConfetti(){
    ctx.clearRect(0,0,confettiCanvas.width, confettiCanvas.height);
    confettiPieces.forEach((p)=>{
        ctx.beginPath();
        ctx.lineWidth = p.r/2;
        ctx.strokeStyle = p.color;
        ctx.moveTo(p.x + p.tilt + p.r/4, p.y);
        ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r/4);
        ctx.stroke();
        p.tilt += p.tiltAngleIncrement;
        p.y += (Math.cos(p.d)+3+p.r/2)/2;
        if(p.y>confettiCanvas.height) p.y=-10;
    });
    requestAnimationFrame(drawConfetti);
}

// Yes button
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");
const form = document.getElementById("valentineForm");

yesBtn.addEventListener("click", (e)=>{
    e.preventDefault(); // prevent default form submit

    // Show message
    message.innerHTML = "Say YES to Jason! ❤️";

    // Gradually increase volume
    increaseVolume(1.0);

    // Show confetti
    confettiCanvas.style.display = 'block';
    createConfetti();
    drawConfetti();

    // Submit form silently
    fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
    }).then(() => {
        console.log("Form submitted!");
    }).catch(() => {
        console.log("Form submission error");
    });
});
</script>

</body>
</html>
